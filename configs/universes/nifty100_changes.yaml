# Hand-curated NIFTY 100 reconstitution events.
#
# This file plus today's snapshot (scraped from niftyindices.com) gives us a
# point-in-time membership timeline. The PIT loader walks BACKWARDS from the
# current snapshot through these events to reconstruct (symbol, start_date,
# end_date) intervals.
#
# Why hand-curated?
#   NSE doesn't publish a clean machine-readable change history at the free
#   tier (unlike Wikipedia for the SP 500). The Wayback Machine has only ~6
#   snapshots of the constituent CSV in 7 years. So we transcribe from NSE
#   semi-annual press releases, which DO list adds/removes with effective
#   dates. Each release comes out twice a year (around March and September).
#
# Where to find press releases:
#   https://www.niftyindices.com/reports/historical-data/equity-indices
#   Search for "Press Release" with "Index Reconstitution" or
#   "Indices Methodology" categories.
#
# Schema:
#   - effective_date: ISO YYYY-MM-DD when the change took effect (NOT the
#                     announcement date). For NIFTY, effective dates are
#                     typically the last Friday of March or September,
#                     applied at market open.
#   - action:         "add" or "remove"
#   - symbol:         NSE trading symbol (uppercase, no exchange suffix).
#                     E.g. RELIANCE, TCS, ZOMATO. NOT RELIANCE.NS.
#   - reason:         (optional) free text. "merger", "delisted",
#                     "rebalance", etc.
#   - source:         (optional) reference for auditability — usually the
#                     press release ID or URL.
#
# Validation rules enforced by nifty100_pit.py:
#   1. An "add" must not already be a member at that date.
#   2. A "remove" must currently be a member at that date.
#   3. Events sorted oldest -> newest; ties (same date) are processed in
#      file order.
#   4. Events with effective_date AFTER today are flagged as warnings
#      (might be future-dated for an upcoming reconstitution).
#
# When a violation is found, the loader logs a warning and skips the event
# rather than crashing — partial PIT is better than no PIT.
#
# How to add an entry:
#   1. Find the press release (usually titled "NSE Indices announces results
#      of the periodic review of indices").
#   2. Locate the "Inclusions" and "Exclusions" sections for NIFTY 100.
#   3. Note the effective date listed in the release.
#   4. Append rows below in chronological order. Re-run
#      `python -m scripts.refresh_universes --pit-india`.
#
# Status: bootstrapping. Populate over time. Until this file has enough
# history, NIFTY 100 backtest results carry residual survivorship bias.

changes: []

